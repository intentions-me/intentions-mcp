<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Intentions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0d0a"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="earth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a96a"/>
      <stop offset="1" stop-color="#e0be8a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0be8a"/>
      <stop offset="1" stop-color="#f0d9a8"/>
    </linearGradient>
  </defs>

  <!-- Square panel (no rounded corners) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Outer ring (Sun orbit) -->
  <circle cx="256" cy="256" r="156.5" fill="none" stroke="#d4a96a" stroke-width="6" opacity="0.4"/>
  <!-- Inner ring (Moon orbit) -->
  <circle cx="256" cy="256" r="112" fill="none" stroke="#d4a96a" stroke-width="4" opacity="0.2"/>

  <!-- Sun — on outer ring, lower-left -->
  <circle cx="142.5" cy="370.5" r="23" fill="url(#sun)"/>
  <!-- Moon — on inner ring, upper-right -->
  <circle cx="335.5" cy="176.5" r="17" fill="#e0be8a" opacity="0.8"/>
  <!-- Earth — center -->
  <circle cx="256" cy="256" r="62.5" fill="url(#earth)"/>
</svg>
